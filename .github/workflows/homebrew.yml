name: homebrew

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string

jobs:
  sync:
    uses: Yarden-zamir/homebrew-tap/.github/workflows/sync-formula.yml@main
    with:
      formula: kitshn
      tag: ${{ github.event.release.tag_name || inputs.tag }}
      repository: Yarden-zamir/kitshn
    secrets:
      token: ${{ secrets.TOKEN }}
